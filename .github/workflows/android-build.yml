name: Build Android AAB (TWA)

on:
  workflow_dispatch:
  push:
    branches: [main, 'claude/**']
    paths:
      - '.github/workflows/android-build.yml'
      - 'android/**'

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          yes | sdkmanager --licenses >/dev/null 2>&1 || true
          sdkmanager "platform-tools" "build-tools;34.0.0" "platforms;android-34" "platforms;android-36" >/dev/null

      - name: Install Bubblewrap CLI
        run: npm install -g @bubblewrap/cli

      - name: Configure Bubblewrap (use preinstalled JDK & SDK)
        run: |
          mkdir -p ~/.bubblewrap
          cat > ~/.bubblewrap/config.json <<EOF
          {
            "jdkPath": "${JAVA_HOME}",
            "androidSdkPath": "${ANDROID_SDK_ROOT}"
          }
          EOF
          # Bubblewrap erwartet ein 'tools'- oder 'bin'-Verzeichnis im SDK-Root
          ln -sfn "${ANDROID_SDK_ROOT}/cmdline-tools/latest" "${ANDROID_SDK_ROOT}/tools" || true
          cat ~/.bubblewrap/config.json

      - name: Decode keystore from secret
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > android/android.keystore
          echo "Keystore-Größe: $(wc -c < android/android.keystore) Bytes"

      - name: Build signed AAB
        working-directory: android
        env:
          BUBBLEWRAP_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          BUBBLEWRAP_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: bubblewrap build --skipPwaValidation

      - name: Show signing fingerprint (Upload-Key)
        working-directory: android
        run: |
          "$ANDROID_SDK_ROOT"/build-tools/34.0.0/apksigner verify --print-certs app-release-signed.apk | grep -i "SHA-256" || true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: thronerush-android
          path: |
            android/app-release-bundle.aab
            android/app-release-signed.apk
          if-no-files-found: error
          retention-days: 30

      - name: Cleanup keystore
        if: always()
        run: rm -f android/android.keystore
