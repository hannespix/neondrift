name: Deploy Telemetrie-Worker

# Deployt den Cloudflare-Telemetrie-Worker UND wendet ausstehende D1-Migrationen
# an – automatisch bei jedem Push auf main, der telemetry-worker/ betrifft.
# Danach musst du nichts mehr von Hand in Cloudflare einfügen.
#
# EINMALIGE EINRICHTUNG (Repo → Settings → Secrets and variables → Actions):
#   CLOUDFLARE_API_TOKEN   – API-Token mit Rechten "Account › Workers Scripts › Edit"
#                            und "Account › D1 › Edit" (Cloudflare → My Profile →
#                            API Tokens → Create Token → Custom).
#   CLOUDFLARE_ACCOUNT_ID  – Account-ID (Cloudflare-Dashboard, rechte Spalte / URL).
# Außerdem in telemetry-worker/wrangler.toml die echte database_id eintragen
# (aus `wrangler d1 create` bzw. Dashboard → D1 → thronerush_telemetry).
#
# Ohne gesetztes CLOUDFLARE_API_TOKEN läuft der Job grün durch und überspringt
# den Deploy (kein roter Workflow, solange noch nicht eingerichtet).

on:
  push:
    branches: [main]
    paths:
      - 'telemetry-worker/**'
      - '.github/workflows/deploy-telemetry.yml'
  workflow_dispatch:

concurrency:
  group: deploy-telemetry
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Secret-Gate
        id: gate
        env:
          TOK: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          if [ -z "$TOK" ]; then
            echo "::notice::CLOUDFLARE_API_TOKEN nicht gesetzt – Deploy übersprungen."
            echo "ok=false" >> "$GITHUB_OUTPUT"
          else
            echo "ok=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Node einrichten
        if: steps.gate.outputs.ok == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: D1-Migrationen anwenden + Worker deployen
        if: steps.gate.outputs.ok == 'true'
        working-directory: telemetry-worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npx --yes wrangler@3 d1 migrations apply thronerush_telemetry --remote
          npx --yes wrangler@3 deploy
