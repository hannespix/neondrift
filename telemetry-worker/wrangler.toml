# THRONERUSH – Telemetrie-Worker (Cloudflare)
# Deploy-Schritte: siehe README.md

name = "thronerush-telemetry"
main = "worker.js"
compatibility_date = "2024-11-01"

# D1-Datenbank-Binding. database_id aus `wrangler d1 create` / Dashboard → D1.
# aus der Ausgabe hier eintragen.
[[d1_databases]]
binding = "DB"
database_name = "thronerush_telemetry"
database_id = "c1f4d8e8-106f-4bf2-aa1a-41ef53794838"
migrations_dir = "migrations"   # Wrangler-Migrationen (von der GitHub Action automatisch angewendet)

[vars]
# Erlaubte Origin für CORS. Im Betrieb auf die echte Spiel-URL setzen,
# z. B. "https://thronerush.example". "*" = alle (nur zum Testen).
ALLOW_ORIGIN = "*"

# Hinweis: ADMIN_TOKEN NICHT hier eintragen, sondern als Secret setzen:
#   wrangler secret put ADMIN_TOKEN
